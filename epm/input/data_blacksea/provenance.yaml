model_name: "Black Sea 2026"

Armenia:

  pDemandForecast:
    source_id: epso_armenia_plexos_2022
    method: "DIRECT (2030–2050 Base Case) + EXTRAP+INTERP (2024–2029) + EXTRAP (2051–2053)"
    method_table:
      - period: "2030–2050"
        method: DIRECT
        notes: "CESI Base Case, slide 10 — 5-year milestones"
      - period: "2024"
        method: EXTRAP
        notes: "Peak: 1300 MW (~2022, slide 8) × 1.035² = 1390 MW. Energy: gross demand 2020 ~6385 GWh × 1.0103⁴ = 6650 GWh"
      - period: "2025–2029"
        method: INTERP
        notes: "Linear interpolation between 2024 baseline and 2030 CESI anchor"
      - period: "2031–2049"
        method: INTERP
        notes: "Linear interpolation between successive 5-year CESI anchors"
      - period: "2051–2053"
        method: EXTRAP
        notes: "Extrapolation at 2045–2050 annual rate (+25 MW/yr, +124 GWh/yr)"
    confidence: medium
    notes: >
      Peak growth rate implied (3.5%/yr) is much higher than energy growth (1.03%/yr),
      consistent with CESI hypothesis of significant electrification of heating and
      transport. Historical gross demand 2020 derived from final consumption (slide 8,
      LOAD FORECAST pptx: 5810 GWh) + T&D losses ~9% (slide 9).
    last_updated: 2026-05-29

  pDemandProfile:
    source_id: teias_hourly_load
    proxy_of: "Turkiye/EastAna"
    method: "PROXY_TurkiyeEastAna"
    method_table:
      - period: "2024–2053"
        method: PROXY_TurkiyeEastAna
        notes: "EastAna (East Anatolia) hourly shape copied verbatim — nearest zone geographically, same model"
    confidence: low
    notes: >
      No Armenia SCADA or hourly load data available. Proxied from the Turkiye profile
      (shared across all TR zones, including EastAna). Key limitation: Armenia's residential
      sector relies heavily on direct electric heating (unlike Turkiye which has significant
      gas penetration), implying a sharper winter morning peak and a higher load factor in Q1.
      Profile should be replaced with GSE/ANRE SCADA data when available.
    last_updated: 2026-05-29

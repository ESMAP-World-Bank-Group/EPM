# Provenance — data_blacksea
# -------------------------------------------------------------------
# One section per country, one entry per EPM resource.
# Filled as each CSV is created. Commit alongside the CSV.
# Run: python pre-analysis/catalog/generate_docs.py --deployment data_blacksea
# -------------------------------------------------------------------

model_name: "Black Sea 2026"

Armenia:

  pDemandForecast:
    source_id: epso_armenia_plexos_2022
    method: "DIRECT (2030–2050 Base Case) + EXTRAP+INTERP (2024–2029) + EXTRAP (2051–2053)"
    method_table:
      - period: "2030–2050"
        method: DIRECT
        notes: "CESI Base Case, slide 10 — 5-year milestones"
      - period: "2024"
        method: EXTRAP
        notes: "Peak: 1300 MW (~2022, slide 8) × 1.035² = 1390 MW. Energy: gross demand 2020 ~6385 GWh × 1.0103⁴ = 6650 GWh"
      - period: "2025–2029"
        method: INTERP
        notes: "Linear interpolation between 2024 baseline and 2030 CESI anchor"
      - period: "2031–2049"
        method: INTERP
        notes: "Linear interpolation between successive 5-year CESI anchors"
      - period: "2051–2053"
        method: EXTRAP
        notes: "Extrapolation at 2045–2050 annual rate (+25 MW/yr, +124 GWh/yr)"
    confidence: medium
    notes: >
      Peak growth rate implied (3.5%/yr) is much higher than energy growth (1.03%/yr),
      consistent with CESI hypothesis of significant electrification of heating and
      transport. Historical gross demand 2020 derived from final consumption (slide 8,
      LOAD FORECAST pptx: 5810 GWh) + T&D losses ~9% (slide 9).
    last_updated: 2026-05-29

  pDemandProfile:
    source_id: teias_hourly_load
    proxy_of: "Turkiye/EastAna"
    needs_review: true
    review_note: "Obtain GSE/ANRE SCADA hourly load data for Armenia to replace Turkiye/EastAna proxy"
    method: "PROXY_TurkiyeEastAna"
    method_table:
      - period: "2024–2053"
        method: PROXY_TurkiyeEastAna
        notes: "EastAna (East Anatolia) hourly shape copied verbatim — nearest zone geographically, same model"
    confidence: low
    notes: >
      No Armenia SCADA or hourly load data available. Proxied from the Turkiye profile
      (shared across all TR zones, including EastAna). Key limitation: Armenia's residential
      sector relies heavily on direct electric heating (unlike Turkiye which has significant
      gas penetration), implying a sharper winter morning peak and a higher load factor in Q1.
      Profile should be replaced with GSE/ANRE SCADA data when available.
    last_updated: 2026-05-29

  pVREProfile:
    source_id: renewables_ninja
    secondary_source_ids: [teias_hourly_load]
    needs_review: true
    review_note: "Rerun representative days pipeline with all Black Sea countries — d1–d6 currently share same seasonal mean (within-season variability lost). ROR proxied from EastAna."
    method: "DIRECT seasonal mean (PV, Wind) — PROXY_EastAna (ROR)"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          PV + Wind: 6-year mean (2018–2023) from Renewables Ninja at Armenia centroid
          (44.5°E, 40.2°N). All d1–d6 within a season share the same mean hourly profile.
      - period: "2024–2053"
        method: PROXY_EastAna
        notes: "ROR: EastAna Turkiye zone rows copied verbatim — nearest zone, similar snowmelt hydrology"
    confidence: low
    notes: >
      Within-season variability (d1–d6 differentiation) is lost — all daytypes in a season
      share the same mean profile. This is a known limitation of the current approach.
      To fix: rerun the full representative days pipeline including Armenia alongside
      all other Black Sea countries (run_blacksea_data.py already supports this).
    last_updated: 2026-05-30

  pAvailabilityCustom:
    source_id: wna_reactor_database
    secondary_source_ids: [epm_generic_defaults]
    method: "DIRECT (Armenia_ANPP) — EPM generic for all other techs"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          Armenia_ANPP: 0.70 flat (Q1–Q4), mean of WNA Energy Availability
          2023 (67.3%) and 2024 (70.4%). All other Armenia generators rely
          on pAvailabilityGeneric defaults (CCGT=0.85, Hydro=0.85, PV/Wind=1.0).
    confidence: high
    notes: >
      Nuclear excluded from pAvailabilityGeneric — availability is plant-specific
      (aging VVER-270 at 0.70 vs new builds at 0.85–0.90).
      Other countries with nuclear plants should add their own custom entry
      referencing wna_reactor_database.
    last_updated: 2026-05-30

  pGenDataInput:
    source_id: epso_armenia_plexos_2022
    secondary_source_ids: [epm_generic_defaults]
    method: "DIRECT (capacity, dates from CESI) — tech params from EPM defaults"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          Capacity and dates (StYr, RetrYr) from CESI PLEXOS study slides.
          HeatRate, RampUpRate, RampDnRate, ResLimShare, FOMperMW, VOM left blank —
          filled automatically at runtime from pGenDataInputGeneric (EPM parameter guide:
          https://esmap-world-bank-group.github.io/EPM/input/input_parameter_guide/).
          Nuclear and ST/Gas defaults added to pGenDataInputGeneric for this deployment.
    confidence: medium
    notes: >
      14 generators: 12 Status-1 (existing), 2 Status-2 (committed), 3 Status-3 (candidates).
      DOUBT — Armenia_Hrazdan_ST: units 1–4 all mothballed per GEM (2024); Capacity set to
      0 MW pending confirmation. CESI shows 300–410 MW nameplate but none dispatchable.
      DOUBT — Armenia_SHC RetrYr=2047: no explicit retirement date found; estimated from
      post-ADB rehabilitation life extension (loan matures 2029). Commissioned 1960–1962.
    last_updated: 2026-05-30

  pFuelPrice:
    source_id: tyndp_iea_weo_2022
    method: "DIRECT (2030–2050 anchors) + INTERP (intermediates) + EXTRAP (2024, 2051–2053)"
    method_table:
      - period: "2030–2050"
        method: DIRECT
        notes: "PLEXOS slide 5 anchors — Gas: 4.680/4.838/4.996/5.101/5.206 €/GJ; HFO: 6.16 €/GJ flat"
      - period: "2031–2049"
        method: INTERP
        notes: "Linear interpolation between successive 5-year anchors (slopes: +0.0316 €/GJ/yr on 2030–2040, +0.021 on 2040–2050)"
      - period: "2024"
        method: EXTRAP
        notes: "Gas: 4.680 − 6 × 0.0316 = 4.490 €/GJ (extrapolation arrière au taux 2030–2035); HFO: flat"
      - period: "2025–2029"
        method: INTERP
        notes: "Linear between 2024 and 2030 anchor"
      - period: "2051–2053"
        method: EXTRAP
        notes: "Gas: +0.021 €/GJ/yr (taux 2045–2050); HFO: flat"
    confidence: medium
    notes: >
      EUR/USD conversion at 1.05 (BCE 2022 annual average). Fuels included: Gas, HFO.
      Uranium proxied flat from Turkiye (0.97 $/GJ — not covered by TYNDP/IEA WEO).
      Coal and Lignite excluded — no coal generation in Armenia existing or planned fleet.
      Gas price reflects TYNDP/IEA market trajectory, not Armenia–Gazprom bilateral
      contract price (~4.5 $/GJ in 2022); difference is small but methodology diverges
      from actual cost structure for near-term years.
    last_updated: 2026-05-29

Georgia:

  pGenDataInput:
    source_id: sesa_georgia_2022
    secondary_source_ids: [ge_power_sector_data_repository, wb_epm_georgia_v85, epm_generic_defaults]
    method: "DIRECT (capacity, dates, tech) — old EPM for HeatRate thermal — generic for all other params"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          113 plants from sesa_georgia_2022 reduced to 46 rows: plants ≥10 MW kept
          individual; plants <10 MW aggregated into Georgia_AGG_SmallHydro (~224 MW).
          Capacity: sesa_georgia_2022. StYr: ge_power_sector_data_repository (commissioning
          year per plant). tech: mapped from Status column (with Reservoir→ReservoirHydro,
          Seasonal/Small→ROR) cross-checked with ge_power_sector_data_repository type column.
          HeatRate for Mtkvari (10.3 MMBtu/MWh) and Gardabani CCGT (6.93 MMBtu/MWh) from
          wb_epm_georgia_v85. All other technical params (VOM, FOM, Capex, RampRate, ResLimShare,
          Life) left blank → filled at runtime from pGenDataInputGeneric (EPM generic defaults).
      - period: "committed"
        method: DIRECT
        notes: >
          4 committed rows (Status=2): Khudoni 702 MW (StYr=2032), Namakhvani 433 MW
          (StYr=2030), Nenskra 280 MW (StYr=2029) from List_of_PPAs_May2022 'Construction'
          stage; Georgia_HydroSHP_Com 549 MW aggregate from PPA construction pipeline.
      - period: "candidates"
        method: DIRECT
        notes: >
          4 candidate rows (Status=3): Wind (300 MW, Capex=1.3 $M/MW),
          PV (200 MW, Capex=0.8 $M/MW) from RE Pipeline; SmallHydro (300 MW),
          BESS (200 MW) — engineering estimates.
    confidence: medium
    needs_review: true
    review_note: >
      (1) Committed large hydro (Khudoni 702 MW, Namakhvani 433 MW, Nenskra 280 MW):
      all politically contested/delayed — StYr estimates uncertain ±3 years.
      Namakhvani suspended due to protests (2021–2022); may need to downgrade to Status=3.
      (2) Tbilsresi CCGT (1963): 60+ year old plant, RetrYr=2027 estimated — confirm
      operational status with CESI/GSE.
      (3) Kirnati capacity discrepancy: sesa_georgia_2022 shows 27.47 MW,
      ge_power_sector_data_repository shows 51.22 MW — used sesa_georgia_2022 value.
      (4) Mtkvari VOM=0.06 $/MWh from wb_epm_georgia_v85 is unusually low — verify.
      (5) Tbilsresi labeled CCGT in data sources but 1963 vintage — likely old steam turbine.
      (6) DomesticCoal for Tkibuli: no entry in pFuelPrice for Georgia yet — needs adding.
    last_updated: 2026-06-04

  pDemandForecast:
    source_id: georgia_demand_load_2022
    method: "DIRECT (2024–2040 from hourly file) + EXTRAP (2041–2053 at 3%/yr)"
    method_table:
      - period: "2024–2040"
        method: DIRECT
        notes: >
          Annual peak (MW) = max hourly value per year from Av. 3% Load growth file.
          Annual energy (GWh) = sum of hourly values / 1000 per year.
          File covers 2021–2040; 2024 is the first model-relevant year.
      - period: "2041–2053"
        method: EXTRAP
        notes: "Extrapolation at 3%/yr from 2040 base (same growth rate as file assumption)."
    confidence: medium
    needs_review: true
    review_note: >
      Peak demand (MW) has no independent cross-validation — only georgia_demand_load_2022 provides
      peak figures. Energy figures validated against historical balance (error <1% for 2023–2024).
      Growth rate of 3%/yr is undocumented — confirm with GSE/GNERC official load forecasts.
      Obtain electrification scenario for post-2030 period (EV, heat pumps) as 3%/yr
      may underestimate long-term growth.
    last_updated: 2026-06-04

  pDemandProfile:
    source_id: georgia_demand_load_2022
    method: "DIRECT seasonal mean from 2025 hourly data, normalized by peak"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          Seasonal mean hourly profile extracted from 2025 data in Av. 3% Load growth file
          (2025 chosen as first model year). Mean computed per (season, hour) → 96 unique
          hourly values. Normalized by max seasonal-mean value (2105 MW in Q4 evening peak).
          All d1–d6 daytypes within a season share the same profile (simplified approach).
    confidence: medium
    needs_review: true
    review_note: >
      Within-season variability (d1–d6 differentiation) is lost — all daytypes in a season
      share the same seasonal mean profile. Same limitation as Armenia pDemandProfile.
      To fix: obtain GSE SCADA hourly load data and rerun the representative days pipeline
      including Georgia.
    last_updated: 2026-06-04

  pVREProfile:
    source_id: wb_epm_georgia_timeseries
    method: "DIRECT seasonal mean from typical-year hourly CFs, normalized by tech peak"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          Three techs (ROR, OnshoreWind, PV) from Timeseries all data.xlsx (sheet RE data).
          Seasonal mean computed per (season, hour) for 8,760 hourly CF values.
          Normalized by the maximum seasonal-mean hourly value across all seasons/hours
          for each tech separately. All d1–d6 daytypes share the same seasonal mean.
          Seasonal CF characteristics:
          ROR — Q2 peak (spring snowmelt) cf_mean=0.977, Q4 minimum cf_mean=0.566.
          Wind — Q2 highest cf_mean=0.902, Q3 lowest cf_mean=0.738.
          PV — Q3 highest (more sun hours), Q1 lowest.
    confidence: medium
    needs_review: true
    review_note: >
      (1) Single typical year — no multi-year average.
      (2) Wind profile: Timeseries mean CF ~0.27 vs actual Qartli 2021 CF ~0.46 —
      Timeseries likely represents a generic Georgian wind site, not Qartli's
      specific high-wind location. Existing Georgia_Qartli_Wind may be
      under-dispatched in the model; consider a separate pVREProfile entry or
      pAvailabilityCustom override for Qartli.
      (3) PV data origin undocumented — replace with Renewables Ninja multi-year
      average when running representative days pipeline for Georgia.
      (4) d1–d6 all share same seasonal mean (within-season variability lost).
    last_updated: 2026-06-04

  pFuelPrice:
    source_id: georgia_fuel_subsidies_2022
    secondary_source_ids: [tyndp_iea_weo_2022]
    method: "Gas: South Caucasus wholesale proxy + Armenia growth rate. DomesticCoal: DIRECT from fuel-subsidies file."
    method_table:
      - period: "2024–2053"
        method: PROXY_Armenia
        notes: >
          Gas: base 4.50 USD/MMBtu in 2024 (South Caucasus wholesale price estimate for
          Azerbaijan→Georgia gas at ~$150/1000m3 ÷ 35.3 GJ/1000m3 ÷ 0.9478 MMBtu/GJ).
          Year-on-year growth applied from Armenia trajectory (tyndp_iea_weo_2022):
          +0.033 USD/MMBtu/yr to 2040, +0.022 USD/MMBtu/yr beyond.
          Result: 2024=4.50 → 2030=4.70 → 2040=5.03 → 2053=5.32 USD/MMBtu.
      - period: "2024–2053"
        method: DIRECT
        notes: >
          DomesticCoal: 3.82 USD/MMBtu flat (= 3.62 USD/GJ from georgia_fuel_subsidies_2022
          power sector coal price, 2021). Tkibuli domestic coal, minimal price variation.
    confidence: low
    needs_review: true
    review_note: >
      Gas price HIGHLY uncertain. georgia_fuel_subsidies_2022 retail price (11.99 USD/GJ)
      is ~3× the estimated wholesale price. South Caucasus proxy (4.5 USD/MMBtu) is based
      on trade data estimates, not confirmed generator-level tariffs.
      Confirm actual Gardabani/Mtkvari/GPower fuel cost with CESI or GNERC tariff orders.
      DomesticCoal: Tkibuli coal quality is sub-bituminous (low calorific value) —
      price may be expressed per ton not per energy unit in actual contracts.
    last_updated: 2026-06-04

  pAvailabilityCustom:
    source_id: wb_epm_georgia_v85
    secondary_source_ids: [georgia_generation_profiles_2019_2022]
    method: "DIRECT from WB EPM v8.5 GenAvailability (ReservoirHydro) + AGGREGATE 2019-2022 (ROR)"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          7 existing ReservoirHydro plants: quarterly CFs from WB_EPM_v8_5.xlsb
          GenAvailability sheet (monthly factors m1-m12 averaged to quarters).
          Plant-specific hydrological calibration from WB EPM Georgia 2022 study:
          Enguri Q1=0.21/Q2=0.48/Q3=0.52/Q4=0.20; Vardnili Q1=0.30/Q2=0.49/Q3=0.48/Q4=0.28;
          Khrami-1&2 Q1=0.12/Q2=0.31/Q3=0.27/Q4=0.32;
          Jinvali Q1=0.28/Q2=0.30/Q3=0.22/Q4=0.18;
          Dzevruli Q1=0.38/Q2=0.17/Q3=0.04/Q4=0.17 (very low summer — specific hydrology);
          Shaori Q1=0.56/Q2=0.30/Q3=0.14/Q4=0.44 (peaks in winter — specific regime).
          3 committed reservoir plants (Khudoni/Namakhvani/Nenskra): proxy from Enguri
          (western Georgia large reservoir profile).
      - period: "2024–2053"
        method: DIRECT_aggregate
        notes: >
          26 ROR plants (23 individual ≥10 MW + AGG_SmallHydro + committed + candidate):
          uniform Q1=0.45, Q2=0.81, Q3=0.54, Q4=0.40 from georgia_generation_profiles_2019_2022.
          4-year average (2019-2022) of total RoR hourly generation / installed RoR capacity.
          pVREProfile for ROR set to 1.0 flat — all seasonal variation in pAvailabilityCustom.
    confidence: medium
    needs_review: true
    review_note: >
      (1) Dzevruli Q3=0.04 and Shaori Q1=0.56 are unusual patterns from old model calibration —
      verify against actual plant hydrology with CESI.
      (2) Committed large reservoir (Khudoni/Namakhvani/Nenskra): proxy from Enguri — no
      plant-specific hydrological data available.
      (3) ROR aggregate: individual plant availability variability lost (Rioni ~0.70 flat
      vs Vartsikhe Q3=0.35 in old model). Acceptable for planning model.
    last_updated: 2026-06-04

Azerbaijan:

  pGenDataInput:
    source_id: gem_gipt
    secondary_source_ids: [epm_generic_defaults]
    method: "DIRECT from GEM GIPT September 2025 via compute_epm_gendata.py"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          57 GEM/GIPT plants mapped to 39 EPM rows (plants with RetrYr<2025 excluded).
          Gas: year<2000 -> ST, year>=2000 -> CCGT. Hydro -> ReservoirHydro.
          Technical params (HeatRate, VOM, FOM, Capex) from epm_generic_defaults.
          Committed: Mingecevir CCGT 4x320 MW (StYr=2025).
    confidence: medium
    needs_review: true
    review_note: >
      All tech params from generic defaults — no country-specific calibrated model.
      Committed large CCGT (Mingecevir 1280 MW) status/year to confirm.
      Old Soviet-era plants (8x300 MW ST Gas, 1990) excluded as pre-2025 retirees.
    last_updated: 2026-06-05

  pDemandForecast:
    source_id: owid_energy_data
    method: "DIRECT from OWID electricity_demand + CAGR extrapolation + load-factor peak"
    method_table:
      - period: "2024–2053"
        method: DIRECT_EXTRAPOLATED
        notes: >
          Anchor: OWID electricity_demand 2025 = 27.17 TWh (net consumption).
          CAGR = 1.9%/yr computed from OWID 2020-2025 trend.
          Peak estimated via load_factor=0.58: Peak_MW = (demand_TWh*1e6/8760) / 0.58.
          2024: Energy=26666 GWh, Peak=5248 MW.
          Computed via compute_epm_demand.py --country AZE.
    confidence: medium
    needs_review: true
    review_note: >
      Peak demand estimated from energy via load factor (0.58) — no independent
      peak data source. CAGR 1.9%/yr based on 5-year trend; may underestimate
      if electrification accelerates. Confirm with SOCAR/Ministry energy balance.
    last_updated: 2026-06-05

  pDemandProfile:
    source_id: run_blacksea_data_proxy
    method: "PROXY Turkey shape from ENTSO-E, scaled to AZ demand, seasonal mean"
    method_table:
      - period: "2024–2053"
        method: PROXY_Turkey
        notes: >
          Load shape: Turkey ENTSO-E hourly profile scaled to AZ annual energy
          (from run_blacksea_data.py, AZE_ANNUAL_MWH=29.3 TWh).
          Seasonal mean per quarter (Q1-Q4), all d1-d6 share same mean profile.
          Q1_mean=0.737 (winter heating peak), Q3_mean=0.651 (summer).
          Computed via compute_epm_demand.py --country AZE --profile.
    confidence: low
    needs_review: true
    review_note: >
      PROXY — no Azerbaijan-specific hourly load data. Turkey shape used as proxy
      (similar climate: continental, hot summers, cold winters).
      TO RECOMPUTE: run full representative-days pipeline for all Black Sea countries
      (including AZ) with VRE profiles when all country data is available.
      Command: python run_blacksea_data.py, then rerun compute_epm_demand.py --profile.
    last_updated: 2026-06-05

  pFuelPrice:
    source_id: imf_energy_subsidies
    secondary_source_ids: [tyndp_iea_weo_2022]
    method: "DIRECT supply price from IMF subsidy database (Gas) + flat estimate (Biomass)"
    method_table:
      - period: "2024–2025"
        method: DIRECT
        notes: >
          Gas: mit_sp_nga_pow (supply price paid by power generators) from
          Georgia_fuel-subsidies_2022.xlsx 'data' sheet, country=AZE.
          2024 = 4.225 USD/GJ = 4.46 USD/MMBtu (converted at 1 GJ = 0.9478 MMBtu).
          This is NOT the domestic subsidized retail price (~$1.5-2/MMBtu) NOR
          the full export/opportunity cost (~$6-8/MMBtu) — it is the actual
          price charged to power generators by SOCAR.
      - period: "2026–2053"
        method: EXTRAPOLATED
        notes: >
          Growth trajectory applied from Armenia (tyndp_iea_weo_2022): same
          year-on-year increments (+0.033/yr to 2040, +0.022/yr beyond).
          Biomass: 0.50 USD/MMBtu flat (Balakhani landfill gas, quasi-free fuel).
    confidence: medium
    needs_review: true
    review_note: >
      Supply price (4.46 $/MMBtu) is between domestic subsidized retail
      (~$1.5-2/MMBtu) and export opportunity cost (~$6-8/MMBtu via TANAP).
      Choice justification: reflects actual generator economics for planning model.
      If WB study requires economic (opportunity) cost approach, use ~$6.5/MMBtu.
      IMF data covers 2015-2025; forward trajectory based on Armenia CAGR.
    last_updated: 2026-06-05

  pAvailabilityCustom:
    source_id: wb_epm_georgia_v85
    method: "PROXY from Georgia Kura River calibration — same river system"
    method_table:
      - period: "2024–2053"
        method: PROXY_Georgia_Kura
        notes: >
          5 ReservoirHydro plants (Mingechevir, Shamkir, Yenikend, Khudafarin,
          Gyz Galasy): all on Kura River downstream of Georgia.
          Seasonal pattern proxied from WB EPM Georgia v8.5 Enguri calibration
          (Q1=0.21, Q2=0.48, Q3=0.52, Q4=0.20) — physically justified: same
          catchment, same snowmelt-driven seasonal cycle.
          All 5 plants share same seasonal CF (no plant-specific data available).
          Thermal/Biomass/VRE: no custom — generic defaults apply.
    confidence: low
    needs_review: true
    review_note: >
      Proxy from Georgia Enguri calibration — no Azerbaijan-specific
      hydrological data used. Should be replaced with actual Mingechevir
      seasonal generation data when available (e.g., GRDC Kura discharge
      at Mingechevir gauge, or AzerEnerji annual generation reports).
      Mingechevir has 16 km3 storage capacity — actual seasonal dispatch
      also depends on irrigation releases and operational decisions,
      not just inflows.
    last_updated: 2026-06-05

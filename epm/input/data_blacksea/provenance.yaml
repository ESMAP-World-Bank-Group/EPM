AzerbaijanMain:

  pGenDataInput:
    source_id: gem_gipt
    secondary_source_ids: [epm_generic_defaults, ssc_az_nakhchivan_2022]
    method: "DIRECT from GEM GIPT September 2025; Nakhchivan capacity removed to Nakhchivan zone"
    method_table:
      - period: "2024–2053"
        method: DIRECT
        notes: >
          57 GEM/GIPT plants mapped to 39 EPM rows (plants with RetrYr<2025 excluded).
          Gas: year<2000 -> ST, year>=2000 -> CCGT. Hydro -> ReservoirHydro.
          Technical params (HeatRate, VOM, FOM, Capex) from epm_generic_defaults.
          Committed: Mingecevir CCGT 4x320 MW (StYr=2025).
          Note: Nakhchivan_CCGT (87 MW) and Nakhchivan_Solar_PV (20 MW) previously
          listed as Azerbaijan have been moved to the Nakhchivan zone. Nakhchivan
          capacity no longer appears in AzerbaijanMain supply.
          Sarsang ReservoirHydro (50 MW, Tartar River, Karabakh) retained in AzerbaijanMain.
          HeatRate (GJ/MWh) calibrated from SSC 002_53-55en ÷ 005_4en by vintage:
            Old CCGTs (StYr 2001-2009): 10.2 GJ/MWh — matches SSC 2020-2023 system
            average of 10.18 GJ/MWh (gas consumed in TJ / thermal electricity in MWh).
            Modern CCGTs (Janub 2013, Shimal 2019, Gobu 2022): 7.5 GJ/MWh — estimated

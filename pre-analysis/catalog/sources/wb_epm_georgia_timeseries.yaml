id: wb_epm_georgia_timeseries
name: "World Bank EPM Georgia 2022 (internal) — VRE Timeseries; PV/Wind original source undocumented"
type: internal
date: "2022"
access_note: >
  File: EPM_Georgia/2022/1. Data/Timeseries all data.xlsx
  Sheet: RE data — 8,760 rows (typical year, T=1→8760), columns: T(h), RoR, PV, Wind.
  Values are capacity factors (0-1). Prepared for World Bank EPM v8.5 Georgia 2022 study.

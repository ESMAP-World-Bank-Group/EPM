quality:
  confidence: medium
  notes: >
    Single typical year — no multi-year averaging. Year of the profile is not
    documented in the file (likely 2019 or 2021 based on study context).
    Wind profile discrepancy: Timeseries shows mean CF ~0.27 across seasons,
    while actual Qartli generation data (2021) implies CF ~0.46 — Timeseries
    represents a generic Georgian wind site, not Qartli's exceptional location.
    PV data origin unclear (possibly modeled from global radiation maps).
    For higher accuracy: rerun with Renewables Ninja multi-year averages and
    run the representative days pipeline for Georgia.

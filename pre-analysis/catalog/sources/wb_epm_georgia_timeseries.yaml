  years: "typical year (single representative year, likely 2019 or 2021)"
fills_epm_resources:
  - resource: pVREProfile
    location: "Sheet 'RE data', columns RoR, PV, Wind"
    coverage: >
      ROR, OnshoreWind, PV seasonal mean hourly profiles for Georgia zone.
